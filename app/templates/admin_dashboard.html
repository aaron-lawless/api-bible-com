<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — AI Bible</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Main (no sidebar) -->
    <main class="main">
      <div class="admin-header">
        <h1>📖 Document Manager</h1>
        <div style="display:flex; gap:0.5rem;">
          <a href="/" class="btn btn-ghost btn-sm">← Back to Search</a>
          <a href="/admin/logout" class="btn btn-ghost btn-sm">Sign out</a>
        </div>
      </div>

      <div class="admin-content">
        <div class="admin-grid">

          <!-- Upload card -->
          <div class="card">
            <h2>Upload Document</h2>

            <div id="alert-box" style="display:none;"></div>

            <form id="upload-form">
              <div
                class="drop-zone"
                id="drop-zone"
                onclick="document.getElementById('file-input').click()"
              >
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p id="drop-label">Drop a file here or click to browse</p>
                <p style="font-size:0.76rem; margin-top:0.25rem;">PDF, DOCX, TXT</p>
                <input type="file" id="file-input" name="file" accept=".pdf,.docx,.txt" />
              </div>

              <div class="progress-wrap" id="progress-wrap">
                <div class="progress-bar" id="progress-bar"></div>
              </div>

              <div class="form-group">
                <label>Title *</label>
                <input type="text" name="title" placeholder="Document title" required />
              </div>

              <div class="form-group">
                <label>Author</label>
                <input type="text" name="author" placeholder="Author name" />
              </div>

              <div class="form-group">
                <label>ISBN</label>
                <input type="text" name="isbn" placeholder="ISBN (optional)" />
              </div>

              <div class="form-group">
                <label>Date Published</label>
                <input type="date" name="date_published" />
              </div>

              <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Short description (optional)"></textarea>
              </div>

              <button type="submit" class="btn btn-primary" id="upload-btn">
                Upload &amp; Ingest
              </button>
            </form>
          </div>

          <!-- Documents list card -->
          <div class="card">
            <h2>
              Uploaded Documents
              <span id="doc-count" style="font-weight:400; color:var(--text-muted); font-size:0.82rem; margin-left:0.4rem;"></span>
            </h2>
            <ul class="doc-list" id="doc-list">
              <li style="color:var(--text-muted); font-size:0.85rem; padding:0.5rem 0.75rem;">
                <span class="spinner"></span>
              </li>
            </ul>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script>
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alert-box');
      box.className = `alert alert-${type}`;
      box.textContent = msg;
      box.style.display = 'block';
      setTimeout(() => { box.style.display = 'none'; }, 5000);
    }

    /* ── Drag & drop ── */
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const dropLabel  = document.getElementById('drop-label');

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) dropLabel.textContent = fileInput.files[0].name;
    });

    dropZone.addEventListener('dragover',  (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
        dropLabel.textContent = file.name;
      }
    });

    /* ── Upload ── */
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn    = document.getElementById('upload-btn');
      const prog   = document.getElementById('progress-wrap');
      const bar    = document.getElementById('progress-bar');

      if (!fileInput.files[0]) { showAlert('Please select a file.', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Ingesting…';
      prog.style.display = 'block';

      // Animate indeterminate progress
      let pct = 0;
      const ticker = setInterval(() => {
        pct = Math.min(pct + Math.random() * 8, 88);
        bar.style.width = pct + '%';
      }, 400);

      const formData = new FormData(e.target);
      formData.set('file', fileInput.files[0]);

      try {
        const resp = await fetch('/ingest', { method: 'POST', body: formData });
        const data = await resp.json();
        clearInterval(ticker);
        bar.style.width = '100%';

        if (resp.ok) {
          showAlert(`✓ Ingested "${escapeHtml(data.title)}" — ${data.chunk_count} chunks`, 'success');
          e.target.reset();
          dropLabel.textContent = 'Drop a file here or click to browse';
          loadDocuments();
        } else {
          showAlert(`Error: ${data.error}`, 'error');
        }
      } catch (err) {
        clearInterval(ticker);
        showAlert(`Network error: ${err.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Upload & Ingest';
        setTimeout(() => { prog.style.display = 'none'; bar.style.width = '0%'; }, 800);
      }
    });

    /* ── Document list ── */
    async function loadDocuments() {
      const list = document.getElementById('doc-list');
      try {
        const resp = await fetch('/documents');
        const docs = await resp.json();

        document.getElementById('doc-count').textContent = `(${docs.length})`;

        if (!docs.length) {
          list.innerHTML = '<li style="color:var(--text-muted); font-size:0.85rem; padding:0.5rem 0.75rem;">No documents yet.</li>';
          return;
        }

        list.innerHTML = docs.map(doc => `
          <li class="doc-item" data-id="${escapeHtml(doc.id)}">
            <div class="doc-item-info">
              <div class="doc-item-title">${escapeHtml(doc.title)}</div>
              <div class="doc-item-meta">${escapeHtml(doc.author || '—')} ${doc.date_published ? '· ' + escapeHtml(doc.date_published) : ''}</div>
            </div>
            <div class="doc-item-actions">
              <button class="btn btn-danger btn-sm" onclick="deleteDoc('${escapeHtml(doc.id)}', this)">Delete</button>
            </div>
          </li>
        `).join('');
      } catch {
        list.innerHTML = '<li style="color:var(--text-muted); font-size:0.85rem; padding:0.5rem 0.75rem;">Failed to load documents.</li>';
      }
    }

    async function deleteDoc(id, btn) {
      if (!confirm('Delete this document and all its chunks?')) return;
      btn.disabled = true;
      btn.textContent = '…';
      try {
        const resp = await fetch(`/documents/${id}`, { method: 'DELETE' });
        if (resp.ok) {
          document.querySelector(`[data-id="${id}"]`)?.remove();
          const remaining = document.querySelectorAll('#doc-list .doc-item').length;
          document.getElementById('doc-count').textContent = `(${remaining})`;
          if (!remaining) {
            document.getElementById('doc-list').innerHTML =
              '<li style="color:var(--text-muted); font-size:0.85rem; padding:0.5rem 0.75rem;">No documents yet.</li>';
          }
        } else {
          const d = await resp.json();
          showAlert(`Delete failed: ${d.error}`, 'error');
          btn.disabled = false;
          btn.textContent = 'Delete';
        }
      } catch (err) {
        showAlert(`Network error: ${err.message}`, 'error');
        btn.disabled = false;
        btn.textContent = 'Delete';
      }
    }

    loadDocuments();
  </script>
</body>
</html>
